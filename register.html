<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>রেজিস্ট্রেশন | বিডি প্র্যাকটিক্যাল ল্যাব</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script>if(localStorage.getItem('theme')==='dark') document.documentElement.classList.add('dark-mode');</script>
</head>
<body class="auth-page">

<div class="nav-overlay" id="nav-overlay"></div>
<header class="header">
  <nav class="nav">
    <a href="index.html" class="logo">BD<span>PracticalLab</span></a>
    <button class="menu-toggle" aria-label="Menu">☰</button>
    <ul class="nav-links" id="nav-links">
      <li><a href="index.html" data-bn="হোম" data-en="Home">হোম</a></li>
      <li><button id="lang-toggle" class="theme-toggle">🌐 EN</button></li>
      <li><button id="theme-toggle" class="theme-toggle">🌙</button></li>
    </ul>
  </nav>
</header>

  <div class="auth-container">
    <div class="auth-box scroll-reveal">
      <a href="index.html" class="logo" style="display:block;text-align:center;margin-bottom:1.5rem;">বিডি <span>প্র্যাকটিক্যাল ল্যাব</span></a>
      <h2>নতুন অ্যাকাউন্ট তৈরি করুন</h2>
      <p style="color:var(--text-muted);text-align:center;margin-bottom:1.8rem;">HSC/SSC প্র্যাকটিক্যালের সম্পূর্ণ গাইডলাইন পান</p>
      
      <form id="register-form" class="auth-form">
        <div class="form-group"><label for="name">পুরো নাম</label><input type="text" id="name" required placeholder="আপনার পুরো নাম"></div>
        <div class="form-group">
          <label for="class">শ্রেণি</label>
          <select id="class" required><option value="">নির্বাচন করুন</option><option value="ssc">SSC (৯ম-১০ম)</option><option value="hsc">HSC (১১শ-১২শ)</option></select>
        </div>
        <div class="form-group"><label for="email">ইমেইল</label><input type="email" id="email" required placeholder="example@mail.com"></div>
        <div class="form-group"><label for="password">পাসওয়ার্ড</label><input type="password" id="password" required minlength="6" placeholder="ন্যূনতম ৬ অক্ষর"></div>
        <div class="form-options"><label class="checkbox"><input type="checkbox" id="terms" required><span>আমি <a href="#">শর্তাবলী</a> মেনে চলতে রাজি</span></label></div>
        <button type="submit" class="btn btn-full" id="reg-btn">রেজিস্ট্রেশন করুন</button>
        <div id="reg-error" class="error-message"></div>
      </form>

      <div class="auth-divider"><span>অথবা</span></div>
      <p class="auth-footer">ইতিমধ্যে অ্যাকাউন্ট আছে? <a href="login.html">লগইন করুন</a></p>
      <a href="index.html" class="back-link">← হোমে ফিরে যান</a>
    </div>
  </div>

  <script type="module">
    import { auth, createUserWithEmailAndPassword, updateProfile, db, doc, setDoc } from './firebase-config.js';

    const form = document.getElementById('register-form');
    const errBox = document.getElementById('reg-error');
    const btn = document.getElementById('reg-btn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      btn.disabled = true; btn.textContent = 'অ্যাকাউন্ট তৈরি হচ্ছে...';
      errBox.style.display = 'none';

      try {
        const { user } = await createUserWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value);
        await updateProfile(user, { displayName: document.getElementById('name').value });
        await setDoc(doc(db, 'users', user.uid), {
          name: document.getElementById('name').value,
          email: document.getElementById('email').value,
          className: document.getElementById('class').value,
          createdAt: new Date().toISOString()
        });
        alert('✅ রেজিস্ট্রেশন সম্পন্ন!');
        window.location.href = 'dashboard.html';
      } catch (err) {
        errBox.textContent = err.code === 'auth/email-already-in-use' ? 'এই ইমেইলটি ইতিমধ্যে ব্যবহৃত' : 
                            err.code === 'auth/weak-password' ? 'পাসওয়ার্ড দুর্বল (ন্যূনতম ৬ অক্ষর)' : 'রেজিস্ট্রেশন ব্যর্থ';
        errBox.style.display = 'block';
        btn.disabled = false; btn.textContent = 'রেজিস্ট্রেশন করুন';
      }
    });
  </script>
  <script src="script.js"></script>
</body>
</html>
