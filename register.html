<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>রেজিস্ট্রেশন | বিডি প্র্যাকটিক্যাল ল্যাব</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script>
    (function() {
      const savedTheme = localStorage.getItem('theme');
      if (savedTheme === 'dark') document.documentElement.classList.add('dark-mode');
    })();
  </script>
  <style>
    .auth-page-fix {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      background: var(--bg);
    }
    .auth-box {
      background: var(--card);
      padding: 2rem;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      width: 100%;
      max-width: 480px;
    }
    .auth-box h2 {
      text-align: center;
      margin-bottom: 0.5rem;
    }
    .auth-form {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }
    .form-group label {
      font-weight: 600;
      font-size: 0.9rem;
    }
    .form-group input, .form-group select {
      padding: 0.8rem;
      background: var(--bg-alt);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: inherit;
      font-size: 1rem;
    }
    .form-group input:focus, .form-group select:focus {
      outline: none;
      border-color: var(--accent);
    }
    .btn-full {
      width: 100%;
      margin-top: 0.5rem;
    }
    .auth-footer {
      text-align: center;
      margin-top: 1.5rem;
      color: var(--text-muted);
    }
    .auth-footer a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }
    .error-message {
      background: rgba(239,68,68,0.1);
      color: #ef4444;
      padding: 0.7rem;
      border-radius: 8px;
      font-size: 0.9rem;
      text-align: center;
      display: none;
    }
  </style>
</head>
<body>
  <div class="nav-overlay" id="nav-overlay"></div>
  <header class="header">
    <nav class="nav">
      <a href="index.html" class="logo">BD<span>PracticalLab</span></a>
      <button class="menu-toggle" id="menuToggle" aria-label="Menu">☰</button>
      <ul class="nav-links" id="navLinks">
        <li><a href="index.html">হোম</a></li>
        <li><button id="themeToggle" class="theme-toggle">🌙</button></li>
      </ul>
    </nav>
  </header>

  <div class="auth-page-fix">
    <div class="auth-box">
      <h2>নতুন অ্যাকাউন্ট</h2>
      <p style="text-align: center; color: var(--text-muted); margin-bottom: 1.5rem;">HSC/SSC প্র্যাকটিক্যালের সম্পূর্ণ গাইডলাইন পান</p>
      
      <form id="registerForm" class="auth-form">
        <div class="form-group">
          <label for="name">পুরো নাম</label>
          <input type="text" id="name" placeholder="আপনার পুরো নাম" required>
        </div>
        <div class="form-group">
          <label for="class">শ্রেণি</label>
          <select id="class" required>
            <option value="">নির্বাচন করুন</option>
            <option value="ssc">SSC (৯ম-১০ম)</option>
            <option value="hsc">HSC (১১শ-১২শ)</option>
          </select>
        </div>
        <div class="form-group">
          <label for="email">ইমেইল</label>
          <input type="email" id="email" placeholder="example@mail.com" required>
        </div>
        <div class="form-group">
          <label for="password">পাসওয়ার্ড</label>
          <input type="password" id="password" placeholder="ন্যূনতম ৬ অক্ষর" required minlength="6">
        </div>
        <button type="submit" class="btn btn-full" id="regBtn">রেজিস্ট্রেশন করুন</button>
        <div id="errorMsg" class="error-message"></div>
      </form>

      <div class="auth-footer">
        <p>ইতিমধ্যে অ্যাকাউন্ট আছে? <a href="login.html">লগইন করুন</a></p>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
  <script type="module">
    import { auth, createUserWithEmailAndPassword, updateProfile, db, doc, setDoc } from './firebase-config.js';
    
    const form = document.getElementById('registerForm');
    const errorMsg = document.getElementById('errorMsg');
    const regBtn = document.getElementById('regBtn');
    
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMsg.style.display = 'none';
      regBtn.disabled = true;
      regBtn.textContent = 'অ্যাকাউন্ট তৈরি হচ্ছে...';
      
      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const className = document.getElementById('class').value;
      
      try {
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        await updateProfile(userCredential.user, { displayName: name });
        
        try {
          await setDoc(doc(db, 'users', userCredential.user.uid), {
            name: name,
            email: email,
            className: className,
            createdAt: new Date().toISOString()
          });
        } catch (firestoreErr) {
          console.log('Firestore not configured, but auth successful');
        }
        
        alert('✅ রেজিস্ট্রেশন সম্পন্ন!');
        window.location.href = 'dashboard.html';
      } catch (err) {
        if (err.code === 'auth/invalid-api-key' || err.code === 'auth/configuration-not-found') {
          alert(`✨ ডেমো রেজিস্ট্রেশন সফল!\nনাম: ${name}\nইমেইল: ${email}\n\n( Firebase কনফিগার করুন রিয়েল অথেন্টিকেশনের জন্য )`);
          window.location.href = 'dashboard.html';
        } else {
          errorMsg.textContent = err.code === 'auth/email-already-in-use' ? 'এই ইমেইলটি ইতিমধ্যে ব্যবহৃত' : 
                                  err.code === 'auth/weak-password' ? 'পাসওয়ার্ড দুর্বল (ন্যূনতম ৬ অক্ষর)' : 'রেজিস্ট্রেশন ব্যর্থ';
          errorMsg.style.display = 'block';
          regBtn.disabled = false;
          regBtn.textContent = 'রেজিস্ট্রেশন করুন';
        }
      }
    });
  </script>
</body>
</html>
