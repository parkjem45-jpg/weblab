<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>লগইন | বিডি প্র্যাকটিক্যাল ল্যাব</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script>
    (function() {
      const savedTheme = localStorage.getItem('theme');
      if (savedTheme === 'dark') document.documentElement.classList.add('dark-mode');
    })();
  </script>
  <style>
    .auth-page-fix {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      background: var(--bg);
    }
    .auth-box {
      background: var(--card);
      padding: 2rem;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      width: 100%;
      max-width: 450px;
    }
    .auth-box h2 {
      text-align: center;
      margin-bottom: 0.5rem;
    }
    .auth-form {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }
    .form-group label {
      font-weight: 600;
      font-size: 0.9rem;
    }
    .form-group input {
      padding: 0.8rem;
      background: var(--bg-alt);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: inherit;
      font-size: 1rem;
    }
    .form-group input:focus {
      outline: none;
      border-color: var(--accent);
    }
    .btn-full {
      width: 100%;
      margin-top: 0.5rem;
    }
    .auth-footer {
      text-align: center;
      margin-top: 1.5rem;
      color: var(--text-muted);
    }
    .auth-footer a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }
    .error-message {
      background: rgba(239,68,68,0.1);
      color: #ef4444;
      padding: 0.7rem;
      border-radius: 8px;
      font-size: 0.9rem;
      text-align: center;
      display: none;
    }
    .demo-note {
      text-align: center;
      font-size: 0.75rem;
      margin-top: 1rem;
      padding: 0.5rem;
      background: rgba(59,130,246,0.1);
      border-radius: 8px;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
  <div class="nav-overlay" id="nav-overlay"></div>
  <header class="header">
    <nav class="nav">
      <a href="index.html" class="logo">BD<span>PracticalLab</span></a>
      <button class="menu-toggle" id="menuToggle" aria-label="Menu">☰</button>
      <ul class="nav-links" id="navLinks">
        <li><a href="index.html">হোম</a></li>
        <li><button id="themeToggle" class="theme-toggle">🌙</button></li>
      </ul>
    </nav>
  </header>

  <div class="auth-page-fix">
    <div class="auth-box">
      <h2>সাইন ইন</h2>
      <p style="text-align: center; color: var(--text-muted); margin-bottom: 1.5rem;">আপনার অ্যাকাউন্টে প্রবেশ করুন</p>
      
      <form id="loginForm" class="auth-form">
        <div class="form-group">
          <label for="email">ইমেইল ঠিকানা</label>
          <input type="email" id="email" name="email" placeholder="example@mail.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label for="password">পাসওয়ার্ড</label>
          <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-full">লগইন</button>
        <div id="errorMsg" class="error-message"></div>
      </form>

      <div class="auth-footer">
        <p>অ্যাকাউন্ট নেই? <a href="register.html">রেজিস্ট্রেশন করুন</a></p>
      </div>
      <div class="demo-note">
        ✨ ডেমো মোড: যেকোনো ইমেইল ও পাসওয়ার্ড দিয়ে লগইন করুন (Firebase সংযোগের জন্য কনফিগার করুন)
      </div>
    </div>
  </div>

  <script src="script.js"></script>
  <script type="module">
    import { auth, signInWithEmailAndPassword } from './firebase-config.js';
    
    const form = document.getElementById('loginForm');
    const errorMsg = document.getElementById('errorMsg');
    
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      
      errorMsg.style.display = 'none';
      
      try {
        await signInWithEmailAndPassword(auth, email, password);
        window.location.href = 'dashboard.html';
      } catch (err) {
        // Demo mode: allow any login if Firebase not configured
        if (err.code === 'auth/invalid-api-key' || err.code === 'auth/configuration-not-found') {
          alert(`✨ ডেমো লগইন সফল!\nইমেইল: ${email}\n\n( Firebase কনফিগার করুন রিয়েল অথেন্টিকেশনের জন্য )`);
          window.location.href = 'dashboard.html';
        } else {
          errorMsg.textContent = err.code === 'auth/user-not-found' ? 'ইমেইল বা পাসওয়ার্ড ভুল' : 'লগইন ব্যর্থ হয়েছে';
          errorMsg.style.display = 'block';
        }
      }
    });
  </script>
</body>
</html>
